<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid main-container">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-white">📊 Sales & Revenue Dashboard</h2>
    <select id="regionFilter" class="form-select w-25">
      <option value="All">All Regions</option>
    </select>
  </div>

  <!-- KPI CARDS -->
  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card kpi gradient-1">
        <h6>Total Sales</h6>
        <h2 id="totalSales">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card kpi gradient-2">
        <h6>Total Revenue</h6>
        <h2 id="totalRevenue">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card kpi gradient-3">
        <h6>Top Product</h6>
        <h2 id="topProduct">-</h2>
      </div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="row mb-4">
    <div class="col-md-6">
      <div class="card chart-card">
        <h6>Revenue Trend</h6>
        <canvas id="revenueChart"></canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card chart-card">
        <h6>Sales by Product</h6>
        <canvas id="productChart"></canvas>
      </div>
    </div>
  </div>

  <!-- INSIGHTS SECTION -->
  <div class="card insight-card">
    <h5>📌 Key Business Insights</h5>
    <ul id="insightsList"></ul>
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
